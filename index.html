<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Sheets Experiment</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; max-width: 500px; margin: auto; padding: 20px; background: #f4f7f6; }
        .box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px #00000010; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #34a853; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .mensaje-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        .mensaje-item:last-child { border: none; }
        small { color: #888; }
    </style>
</head>
<body>

    <div class="box">
        <h3>Nueva Entrada</h3>
        <input type="text" id="nombre" placeholder="Nombre">
        <input type="text" id="mensaje" placeholder="Mensaje">
        <button onclick="enviar()">Guardar en Sheets</button>
    </div>

    <div class="box">
        <h3>Registros Recientes</h3>
        <div id="lista">Cargando datos...</div>
    </div>

<script>
    const URL_API = "TU_URL_DE_APPS_SCRIPT_AQUI";

    // Función para LEER datos
    async function cargarDatos() {
        try {
            const response = await fetch(URL_API);
            const datos = await response.json();
            const contenedor = document.getElementById('lista');
            contenedor.innerHTML = datos.map(item => `
                <div class="mensaje-item">
                    <strong>${item.nombre}</strong>: ${item.mensaje}<br>
                    <small>${new Date(item.fecha).toLocaleString()}</small>
                </div>
            `).join('') || "No hay mensajes.";
        } catch (e) {
            document.getElementById('lista').innerText = "Error al cargar.";
        }
    }

    // Función para ENVIAR datos
    async function enviar() {
        const nombre = document.getElementById('nombre').value;
        const mensaje = document.getElementById('mensaje').value;
        
        await fetch(URL_API, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ nombre, mensaje })
        });

        alert("¡Enviado! (Recarga para ver cambios)");
        location.reload(); // Recargamos para ver el nuevo dato
    }

    // Cargar al iniciar
    window.onload = cargarDatos;
</script>
</body>
</html>
